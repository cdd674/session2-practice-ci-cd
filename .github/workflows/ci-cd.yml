name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 必须加：设置 Node.js 环境
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # 必须加：安装依赖
      - name: Install dependencies
        run: npm install

      # 修复：npn → npm
      - name: Run tests
        run: npm run test
